name: Build Price Translator APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" >/dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build debug APK
        id: build
        shell: bash
        run: |
          set +e
          gradle assembleDebug --console=plain > build.log 2>&1
          code=$?
          echo "$code" > build-exit-code.txt
          exit 0

      - name: Upload build diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: PriceTranslator-Build-Log
          path: |
            build.log
            build-exit-code.txt

      - name: Verify build result
        shell: bash
        run: |
          code=$(cat build-exit-code.txt)
          if [ "$code" != "0" ]; then
            tail -n 120 build.log
            exit "$code"
          fi

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PriceTranslator.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PriceTranslator-APK
          path: PriceTranslator.apk
          if-no-files-found: error
